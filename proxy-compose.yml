services:
  #https://hub.docker.com/r/jc21/nginx-proxy-manager
  proxymanager:
    image: jc21/nginx-proxy-manager:${PROXYMANAGER_VERSION:-latest}
    container_name: proxymanager
    hostname: proxymanager
    restart: unless-stopped
    networks:
      - pihole
    ports:
      - "${PROXYMANAGER_PORT}:81"
      - "${PROXYMANAGER_HTTP_PORT}:80"
      - "${PROXYMANAGER_HTTPS_PORT}:443"
    volumes:
      - "${CONFIG}/proxymanager:/data"
      - "${CONFIG}/letsencrypt:/etc/letsencrypt"

networks:
  pihole:
    name: pihole
    external: true
